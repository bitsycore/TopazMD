name: Release

# Triggers on any `v*` tag push (e.g. v1.0.0) and via the Actions UI's "Run workflow" button.
# The matrix job builds installers + standalone bundles for each desktop platform; the final
# `release` job collects every artifact and publishes a single GitHub Release.
on:
  push:
    tags:
      # Match both `v1.0.0` and bare `1.0.0` style tags (and any -rc / -beta suffix variant).
      - 'v*'
      - '[0-9]*'
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos
          - os: windows-latest
            platform: windows
          - os: ubuntu-latest
            platform: linux
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # Provides a JDK for the Gradle daemon. The build's own toolchain (vendor = JETBRAINS)
      # downloads JBR 21 separately via the foojay resolver — this step just bootstraps Gradle.
      - name: Set up bootstrap JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        if: matrix.platform != 'windows'
        run: chmod +x ./gradlew

      # The unpacked, runnable folder/bundle — `.app` on macOS, `JewelMarkdown/` directory
      # everywhere else. Same JRE+classpath layout the installers wrap, also used as input
      # for the AppImage step on Linux.
      - name: Build release distributable (standalone)
        run: ./gradlew --no-daemon createReleaseDistributable --stacktrace

      # Per-platform installer tasks split out so each format shows as its own step in the
      # CI log — easier to spot which one failed if one of them does, and `--stacktrace`
      # produces a usable error trace inline. Each installer is copied to the workspace
      # root after build so the upload-artifact step (and the release job's `artifacts/*`
      # glob) finds it as a top-level file rather than buried under build/compose/binaries.
      - name: Build DMG installer (macOS)
        if: matrix.platform == 'macos'
        run: |
          ./gradlew --no-daemon packageReleaseDmg --stacktrace
          cp build/compose/binaries/main-release/dmg/*.dmg "$GITHUB_WORKSPACE/"

      - name: Build MSI installer (Windows)
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          ./gradlew --no-daemon packageReleaseMsi --stacktrace
          cp build/compose/binaries/main-release/msi/*.msi "$GITHUB_WORKSPACE/"

      - name: Build DEB + RPM installers (Linux)
        if: matrix.platform == 'linux'
        run: |
          ./gradlew --no-daemon packageReleaseDeb packageReleaseRpm --stacktrace
          cp build/compose/binaries/main-release/deb/*.deb "$GITHUB_WORKSPACE/"
          cp build/compose/binaries/main-release/rpm/*.rpm "$GITHUB_WORKSPACE/"

      - name: Zip standalone .app (macOS)
        if: matrix.platform == 'macos'
        run: |
          cd build/compose/binaries/main-release/app
          zip -ry "${{ github.workspace }}/JewelMarkdown-macos.zip" JewelMarkdown.app

      - name: Zip standalone folder (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          Compress-Archive -Path build/compose/binaries/main-release/app/JewelMarkdown/* `
            -DestinationPath JewelMarkdown-windows.zip

      - name: Tar standalone folder (Linux)
        if: matrix.platform == 'linux'
        run: |
          cd build/compose/binaries/main-release/app
          tar -czf "${{ github.workspace }}/JewelMarkdown-linux.tar.gz" JewelMarkdown

      # Build an AppImage from the Linux standalone distribution. appimagetool wraps the
      # AppDir (a self-contained filesystem layout with AppRun launcher + desktop entry +
      # icon) into a single executable .AppImage. Icon is a flat 256x256 placeholder PNG
      # we generate with Python's stdlib so we don't depend on ImageMagick being preinstalled.
      - name: Build AppImage (Linux)
        if: matrix.platform == 'linux'
        run: |
          set -e
          # appimagetool ships as an AppImage and needs FUSE to mount itself at runtime.
          # GitHub's ubuntu-latest images don't have libfuse, so we --appimage-extract first
          # and invoke the extracted AppRun directly.
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool
          ./appimagetool --appimage-extract >/dev/null
          APPIMAGETOOL=./squashfs-root/AppRun

          rm -rf AppDir
          mkdir -p AppDir/usr
          cp -r build/compose/binaries/main-release/app/JewelMarkdown/. AppDir/usr/

          cat > AppDir/AppRun <<'EOF'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/JewelMarkdown" "$@"
          EOF
          chmod +x AppDir/AppRun

          cat > AppDir/JewelMarkdown.desktop <<'EOF'
          [Desktop Entry]
          Name=JewelMarkdown
          GenericName=Markdown Editor
          Comment=Markdown editor with live preview
          Exec=JewelMarkdown
          Icon=JewelMarkdown
          Type=Application
          Categories=Office;TextEditor;Utility;
          Terminal=false
          EOF

          python3 - <<'PYEOF'
          import struct, zlib
          w, h = 256, 256
          r, g, b = 0x2A, 0x2C, 0x34
          def chunk(t, d):
              return struct.pack('>I', len(d)) + t + d + struct.pack('>I', zlib.crc32(t + d))
          sig = b'\x89PNG\r\n\x1a\n'
          ihdr = chunk(b'IHDR', struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0))
          row = b'\x00' + bytes([r, g, b]) * w
          idat = chunk(b'IDAT', zlib.compress(row * h))
          iend = chunk(b'IEND', b'')
          with open('AppDir/JewelMarkdown.png', 'wb') as f:
              f.write(sig + ihdr + idat + iend)
          PYEOF

          ARCH=x86_64 "$APPIMAGETOOL" --no-appstream AppDir "${{ github.workspace }}/JewelMarkdown-x86_64.AppImage"

      # All installer + standalone files now live at the workspace root, so the upload
      # uses flat globs. Result on download: a single artifacts/ directory with every file
      # at the top level — no nested build/compose/binaries/… paths to trip up the release
      # job's `files: artifacts/*` glob.
      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: dist-${{ matrix.platform }}
          if-no-files-found: ignore
          path: |
            *.dmg
            *.msi
            *.deb
            *.rpm
            JewelMarkdown-macos.zip
            JewelMarkdown-windows.zip
            JewelMarkdown-linux.tar.gz
            JewelMarkdown-x86_64.AppImage

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    # Needed by softprops/action-gh-release to create/update the release.
    permissions:
      contents: write
    steps:
      - name: Download all platform artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          pattern: dist-*
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
